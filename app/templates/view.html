<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>{{ filename }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='code.css') }}">
  {% if is_markdown %}
  <link
    id="hljsTheme"
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
  >
  {% endif %}
</head>
<body>
  <div class="container">
    <div class="file-header">
      <div>
        <h1>{{ title }}</h1>
        <div class="file-name">{{ filename }}</div>
        <div class="tags">
          <span class="tag tag-{{ language }}">{{ language }}</span>
        </div>
      </div>
      <div class="file-header-right">
        <div class="views">👁 {{ views }}</div>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Переключить тему">🌙</button>
      </div>
    </div>

    <div class="buttons">
      <a class="btn btn-download" href="{{ url_for('download', filename=filename) }}">⬇ Скачать</a>
      <a
        class="btn btn-github"
        href="https://github.com/ISemene4kaI/semka_informatics/tree/main/app/code_storage/{{ filename }}"
        target="_blank"
        rel="noopener noreferrer"
      >
        GitHub
      </a>
      <button class="btn btn-copy" id="copyBtn">📋 Copy</button>
      <a class="btn btn-back" href="{{ url_for('index') }}">← Назад</a>
    </div>

    {% if is_markdown %}
    <div class="markdown-body markdown-container">
      {{ markdown | safe }}
    </div>
    {% else %}
    <div class="code-wrapper">
      <pre class="code-pre">{% for line in lines -%}
<span class="line"><span class="number">{{ loop.index }}</span><span class="code">{{ line | e }}</span></span>
{%- endfor %}</pre>
    </div>
    {% endif %}
  </div>

  {% if is_markdown %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    hljs.highlightAll();
  </script>
  {% endif %}
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
