<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Последние обновления</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <header class="hero">

            <div>
                <h1>📜 Последние обновления</h1>
                <p class="subtitle">Последние добавленные или изменённые файлы</p>
            </div>

            <a class="btn btn-back" href="/">← Назад</a>

        </header>


        <div class="updates-list">

            {% for file in latest %}

                <a class="update-card" href="/view/{{ file.filename }}">

                    <div class="update-title">
                        {{ file.icon }} {{ file.title }}
                    </div>

                    <div class="update-meta">

                        <span class="tag tag-{{ file.ext }}">
                            {{ file.ext }}
                        </span>

                        <span class="date">
                            🕒 {{ file.mtime }}
                        </span>

                        <span class="update-filename">
                            • Название файла: {{ file.filename }}
                        </span>

                    </div>

                </a>

            {% endfor %}

        </div>

    </div>

</body>
</html>
